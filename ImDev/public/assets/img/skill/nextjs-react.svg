<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Next.js Official Logo -->
  <defs>
    <clipPath id="circleClip">
      <circle cx="64" cy="64" r="60"/>
    </clipPath>
    <linearGradient id="lineGrad" x1="0.5" y1="0.2" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Black circle -->
  <circle cx="64" cy="64" r="60" fill="#333333"/>
  <!-- N letter with diagonal extending out, clipped to circle -->
  <g clip-path="url(#circleClip)">
    <!-- Left vertical stroke of N (rounded top) -->
    <rect x="40" y="38" width="7" height="52" rx="3.5" ry="3.5" fill="#ffffff"/>
    <!-- Diagonal stroke of N extending beyond circle -->
    <line x1="43" y1="40" x2="98" y2="120" stroke="url(#lineGrad)" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- Right vertical stroke (short, gradient fade) -->
  <defs>
    <linearGradient id="vertGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#circleClip)">
    <rect x="81" y="38" width="7" height="52" rx="3.5" ry="3.5" fill="url(#vertGrad)"/>
  </g>
</svg>
